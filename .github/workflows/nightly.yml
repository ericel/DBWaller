name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tier-c:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install . --output-folder=build --build=missing
          -s build_type=Release
          -s compiler.cppstd=20
          -o '&:with_tests=True'
          -o '&:with_benchmarks=False'
          -o '&:build_apps=False'

      - name: Configure
        run: cmake --preset conan-release-tests

      - name: Build
        run: cmake --build --preset build-conan-release-tests

      - name: Run Tier C tests
        run: ctest --preset tier-c-nightly

      - name: Upload nightly test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-testing-artifacts
          path: build/build/Release/Testing
          if-no-files-found: ignore
