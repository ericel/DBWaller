name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Read tracked version
        id: version
        run: echo "value=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.version.outputs.value }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${{ steps.version.outputs.value }}"
            exit 1
          fi

      - name: Install dependencies
        run: >
          conan install . --output-folder=build --build=missing
          -s build_type=Release
          -s compiler.cppstd=20
          -o '&:with_tests=True'
          -o '&:with_benchmarks=False'
          -o '&:build_apps=False'

      - name: Configure
        run: cmake --preset conan-release-tests

      - name: Build
        run: cmake --build --preset build-conan-release-tests

      - name: Run Tier B tests
        run: ctest --preset tier-b-main

      - name: Create Conan package
        run: >
          conan create . --build=missing
          -s build_type=Release
          -s compiler.cppstd=20
          -o '&:with_tests=False'
          -o '&:with_benchmarks=False'
          -o '&:build_apps=False'

      - name: Upload Conan package to Artifactory (optional)
        if: ${{ vars.ARTIFACTORY_REMOTE_NAME != '' && vars.ARTIFACTORY_REMOTE_URL != '' && secrets.ARTIFACTORY_USERNAME != '' && secrets.ARTIFACTORY_PASSWORD != '' }}
        env:
          ARTIFACTORY_REMOTE_NAME: ${{ vars.ARTIFACTORY_REMOTE_NAME }}
          ARTIFACTORY_REMOTE_URL: ${{ vars.ARTIFACTORY_REMOTE_URL }}
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
        run: |
          conan remote add "${ARTIFACTORY_REMOTE_NAME}" "${ARTIFACTORY_REMOTE_URL}" --force
          conan remote login "${ARTIFACTORY_REMOTE_NAME}" "${ARTIFACTORY_USERNAME}" -p "${ARTIFACTORY_PASSWORD}"
          conan upload "dbwaller/${{ steps.version.outputs.value }}" --remote="${ARTIFACTORY_REMOTE_NAME}" --confirm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
